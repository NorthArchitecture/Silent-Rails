[toolchain]
anchor_version = "0.32.0"
solana_version = "2.3.0"

[features]
resolution = true
skip-lint = false
seeds = true

[programs.localnet]
sentinel = "ABXXfFPfPhha6KFSQVz9i3FSQ9DSPEk4w585bHkp7U42"

[programs.devnet]
sentinel = "ABXXfFPfPhha6KFSQVz9i3FSQ9DSPEk4w585bHkp7U42"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/*"]