[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false
seeds = true

[programs.localnet]
sentinel = "83yN8hf9V8P8eFU8B3bRfpQRPAZopTSEac8J33NEcLci"

[programs.devnet]
sentinel = "83yN8hf9V8P8eFU8B3bRfpQRPAZopTSEac8J33NEcLci"

[programs.mainnet]
sentinel = "83yN8hf9V8P8eFU8B3bRfpQRPAZopTSEac8J33NEcLci"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/*"]