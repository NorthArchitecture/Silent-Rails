[toolchain]
anchor_version = "0.32.0"
solana_version = "2.3.0"

[features]
resolution = false
skip-lint = false
seeds = true

[programs.localnet]
sentinel = "2irwJBqfhchJSgCFVr3APxv1wfgpF2bwS9EkeyNfY55a"

[programs.devnet]
sentinel = "2irwJBqfhchJSgCFVr3APxv1wfgpF2bwS9EkeyNfY55a"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "rm -rf test-ledger/ && npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/*"]